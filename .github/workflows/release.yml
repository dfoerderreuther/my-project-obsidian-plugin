name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Package plugin zip
        run: |
          mkdir -p my-project-panel
          cp main.js manifest.json styles.css my-project-panel/
          zip -r my-project-panel.zip my-project-panel

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            my-project-panel.zip
            main.js
            manifest.json
            styles.css
